<!doctype html><html><head>
<meta charset="utf-8"/><title>Healing Analytics v12.8</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:system-ui;margin:24px;max-width:980px}
select,button{margin:6px;padding:6px 10px}
canvas{margin-top:10px}
</style></head><body>
<h1>💚 Healing Analytics v12.8</h1>
<label>🌍 Language:
<select id="lang"><option>en</option><option>es</option><option>fr</option>
<option>pt</option><option>ko</option><option>de</option><option>ja</option></select>
</label><button onclick="loadSummary()">Load</button>
<p id="summary"></p><button id="speak">🔊 Listen</button>
<canvas id="chart" height="120"></canvas>
<script>
async function loadSummary(){
 const lang=document.getElementById("lang").value;
 const d=new Date().toISOString().slice(0,10);
 try{
  const s=await fetch(`./summaries/daily-${d}-${lang}.json`).then(r=>r.json());
  document.getElementById("summary").textContent=s.summary;
  document.getElementById("speak").onclick=()=>new Audio(`./audio/daily-${d}-${lang}.mp3`).play();
 }catch{document.getElementById("summary").textContent="(No summary)";}
}
async function draw(){
 const cmp=await fetch("./charts/comparison.json").then(r=>r.json());
 let pred={};try{pred=await fetch("./predictions/tomorrow.json").then(r=>r.json());}catch{}
 const ctx=document.getElementById("chart");
 new Chart(ctx,{type:"line",data:{
  labels:[...cmp.labels,"Tomorrow"],
  datasets:[
   {label:"Mood",data:[...cmp.mood,pred.mood||null],borderColor:"#2b7"},
   {label:"Compliance",data:[...cmp.compliance,pred.compliance||null],borderColor:"#28f"},
   {label:"AI Sentiment",data:[...cmp.sentiment,pred.sentiment||null],borderColor:"#f55"},
   {label:"Predicted",data:[null,null,null,pred.avg||null],borderColor:"#aaa",borderDash:[5,5]}]
 }});
}
draw();
</script></body></html>
