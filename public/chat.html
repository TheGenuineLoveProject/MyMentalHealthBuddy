<!DOCTYPE html>
<html>
<head>
        <title>MyMentalHealthBuddy Chat</title>
        <style>
                body {
                        font-family: Arial;
                        background: #0f172a;
                        color: white;
                        padding: 20px;
                }

                #chat {
                        max-width: 600px;
                        margin: auto;
                }

                .msg {
                        margin: 10px 0;
                        padding: 10px;
                        border-radius: 8px;
                }

                .user {
                        background: #2563eb;
                        text-align: right;
                }

                .ai {
                        background: #1e293b;
                }

                input {
                        width: 80%;
                        padding: 10px;
                }

                button {
                        padding: 10px;
                        background: #22c55e;
                        border: none;
                        color: white;
                }
        </style>
</head>
<body>

<div id="chat">
        <h2>MyMentalHealthBuddy</h2>
        <div id="messages"></div>

        <input id="input" placeholder="Type your message..." />
        <button onclick="send()">Send</button>
</div>

<script>
async function send() {
        const input = document.getElementById("input");
        const message = input.value;

        if (!message) return;

        addMessage(message, "user");
        input.value = "";

        try {
                const res = await fetch("/api/ai/chat", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ message })
                });
                const data = await res.json();
                addMessage(data.reply || data.error || "(no reply)", "ai");
        } catch (err) {
                addMessage("Network error: " + err.message, "ai");
        }
}

function addMessage(text, type) {
        const div = document.createElement("div");
        div.className = "msg " + type;
        div.innerText = text;

        document.getElementById("messages").appendChild(div);
}
</script>

</body>
</html>
