<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding – The Genuine Love Project</title>
  <link rel="stylesheet" href="styles.css" />
  <meta name="description" content="Start your personalized healing journey with The Genuine Love Project." />
</head>
<body class="onboarding-page">

  <!-- Header -->
  <header class="header">
    <img src="/assets/logo.png" alt="The Genuine Love Project Logo" class="logo" />
    <nav class="nav">
      <a href="login.html" class="nav-link">Login</a>
      <a href="index.html" class="nav-link">Home</a>
    </nav>
  </header>

  <!-- Onboarding Intro -->
  <section class="hero onboarding-hero">
    <h1 class="hero-title">Begin Your Journey</h1>
    <p class="hero-subtitle">Tell us about you so we can personalize your experience.</p>
  </section>

  <!-- Onboarding Form -->
  <section class="onboarding-form">
    <form action="homepage.html" method="get">
      <label for="goal">What brings you here?</label>
      <select id="goal" name="goal" required>
        <option value="" disabled selected>Select a goal</option>
        <option value="stress">Reduce stress/anxiety</option>
        <option value="support">Find emotional support</option>
        <option value="growth">Personal growth</option>
        <option value="community">Join a healing community</option>
      </select>

      <label for="name">First Name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required />

      <button type="submit" class="cta-primary">Continue</button>
    </form>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2026 The Genuine Love Project</p>
    <a href="qa.html" class="footer-link">Community Q&A</a>
  </footer>
</body>
</html>
