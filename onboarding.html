<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding – The Genuine Love Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section class="onboarding">
    <h2>Let’s Get to Know You</h2>
    <form action="/homepage.html" method="POST" class="form">
      <label>Name: <input type="text" name="name" required /></label>
      <label>Email: <input type="email" name="email" required /></label>
      <label>What brings you here? <textarea name="reason"></textarea></label>
      <button type="submit" class="cta-button">Continue</button>
    </form>
  </section>
</body>
</html>
