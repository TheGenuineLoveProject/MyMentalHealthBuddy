<!-- 
  COMPONENT: Donation / Payment Form
  DESCRIPTION: Stripe-style payment form for donations
  VARIANTS: one-time, monthly, custom
  FIGMA LAYER: Donation / PaymentForm
  CLASSES: .donation-form, .donation-form__amounts, .donation-form__input
-->

<!-- Donation Form -->
<form class="donation-form" id="donation-form" data-testid="donation-form">
  <header class="donation-form__header">
    <img src="/assets/icons/heart.svg" alt="" width="48" height="48" class="donation-form__icon" aria-hidden="true" />
    <h2 class="donation-form__title">Support Our Mission</h2>
    <p class="donation-form__text">Your donation helps us provide accessible mental wellness resources to those in need.</p>
  </header>
  
  <!-- Donation Type Toggle -->
  <div class="donation-form__toggle" role="group" aria-label="Donation type">
    <button type="button" class="donation-form__toggle-btn donation-form__toggle-btn--active" data-type="one-time">
      One-Time
    </button>
    <button type="button" class="donation-form__toggle-btn" data-type="monthly">
      Monthly
    </button>
  </div>
  
  <!-- Preset Amounts -->
  <fieldset class="donation-form__amounts">
    <legend class="sr-only">Select donation amount</legend>
    <label class="donation-form__amount">
      <input type="radio" name="amount" value="10" class="sr-only" />
      <span class="donation-form__amount-box">$10</span>
    </label>
    <label class="donation-form__amount">
      <input type="radio" name="amount" value="25" class="sr-only" />
      <span class="donation-form__amount-box">$25</span>
    </label>
    <label class="donation-form__amount donation-form__amount--selected">
      <input type="radio" name="amount" value="50" class="sr-only" checked />
      <span class="donation-form__amount-box">$50</span>
    </label>
    <label class="donation-form__amount">
      <input type="radio" name="amount" value="100" class="sr-only" />
      <span class="donation-form__amount-box">$100</span>
    </label>
    <label class="donation-form__amount">
      <input type="radio" name="amount" value="custom" class="sr-only" />
      <span class="donation-form__amount-box">Custom</span>
    </label>
  </fieldset>
  
  <!-- Custom Amount Input -->
  <div class="form-group donation-form__custom" hidden>
    <label for="custom-amount" class="form-label">Enter Amount</label>
    <div class="donation-form__input-wrapper">
      <span class="donation-form__currency">$</span>
      <input 
        type="number" 
        id="custom-amount" 
        name="custom_amount"
        class="form-input donation-form__input" 
        placeholder="0.00"
        min="1"
        step="0.01"
      />
    </div>
  </div>
  
  <!-- Payment Details -->
  <div class="donation-form__payment">
    <h3 class="donation-form__section-title">Payment Details</h3>
    
    <div class="form-group">
      <label for="card-name" class="form-label">Name on Card</label>
      <input 
        type="text" 
        id="card-name" 
        name="card_name"
        class="form-input" 
        placeholder="Jane Smith"
        required
        autocomplete="cc-name"
      />
    </div>
    
    <div class="form-group">
      <label for="card-number" class="form-label">Card Number</label>
      <input 
        type="text" 
        id="card-number" 
        name="card_number"
        class="form-input donation-form__card-input" 
        placeholder="1234 5678 9012 3456"
        required
        autocomplete="cc-number"
        inputmode="numeric"
        pattern="[0-9\s]{13,19}"
      />
    </div>
    
    <div class="donation-form__row">
      <div class="form-group">
        <label for="card-expiry" class="form-label">Expiry Date</label>
        <input 
          type="text" 
          id="card-expiry" 
          name="card_expiry"
          class="form-input" 
          placeholder="MM/YY"
          required
          autocomplete="cc-exp"
          inputmode="numeric"
        />
      </div>
      <div class="form-group">
        <label for="card-cvc" class="form-label">CVC</label>
        <input 
          type="text" 
          id="card-cvc" 
          name="card_cvc"
          class="form-input" 
          placeholder="123"
          required
          autocomplete="cc-csc"
          inputmode="numeric"
          maxlength="4"
        />
      </div>
    </div>
  </div>
  
  <!-- Donor Info -->
  <div class="donation-form__donor">
    <h3 class="donation-form__section-title">Your Information</h3>
    
    <div class="form-group">
      <label for="donor-email" class="form-label">Email</label>
      <input 
        type="email" 
        id="donor-email" 
        name="donor_email"
        class="form-input" 
        placeholder="you@example.com"
        required
        autocomplete="email"
      />
    </div>
    
    <label class="donation-form__checkbox">
      <input type="checkbox" name="receipt" checked />
      <span>Send me a tax-deductible receipt</span>
    </label>
    
    <label class="donation-form__checkbox">
      <input type="checkbox" name="newsletter" />
      <span>Subscribe to our wellness newsletter</span>
    </label>
  </div>
  
  <!-- Submit -->
  <button type="submit" class="btn btn--primary donation-form__submit" data-testid="donation-submit">
    <img src="/assets/icons/heart.svg" alt="" width="20" height="20" aria-hidden="true" />
    Donate $50
  </button>
  
  <p class="donation-form__secure">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Secure payment powered by Stripe
  </p>
  
  <!-- Hidden CRM Fields -->
  <input type="hidden" name="source" value="donation_page" />
  <input type="hidden" name="campaign" value="general" />
</form>
