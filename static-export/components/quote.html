<!-- 
  COMPONENT: Quote Module
  DESCRIPTION: Wellness quote block with author attribution
  VARIANTS: default, large, card
  FIGMA LAYER: Quote / QuoteBlock
  CLASSES: .quote-block, .quote-block--large, .quote-block--card
-->

<!-- Default Quote Block -->
<blockquote class="quote-block" data-testid="quote-default">
  <p class="quote-block__text">"Healing is not linear. Be gentle with yourself as you grow."</p>
  <footer class="quote-block__footer">
    <cite class="quote-block__author">— Daily Wisdom</cite>
  </footer>
</blockquote>

<!-- Large Quote Block (Featured) -->
<blockquote class="quote-block quote-block--large" data-testid="quote-large">
  <img src="/assets/icons/sparkle.svg" alt="" width="40" height="40" class="quote-block__icon" aria-hidden="true" />
  <p class="quote-block__text">"The greatest gift you can give yourself is the permission to heal at your own pace."</p>
  <footer class="quote-block__footer">
    <cite class="quote-block__author">— Dr. Sarah Chen</cite>
  </footer>
</blockquote>

<!-- Card Quote Block -->
<div class="quote-block quote-block--card" data-testid="quote-card">
  <div class="quote-block__category">Today's Affirmation</div>
  <p class="quote-block__text">"I am worthy of love, peace, and genuine connection."</p>
  <div class="quote-block__actions">
    <button class="btn btn--text" aria-label="Share quote">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
      Share
    </button>
    <button class="btn btn--text" aria-label="Save quote">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Save
    </button>
  </div>
</div>
