<!-- 
  COMPONENT: Navigation Bar
  DESCRIPTION: Sticky header with logo, nav links, mobile toggle, auth buttons
  BREAKPOINTS: Mobile (<768px), Tablet (768-1023px), Desktop (1024px+)
  FIGMA LAYER: NavBar / Header
  CLASSES: .header, .header__inner, .header__logo, .header__nav, .header__actions
-->

<header class="header" id="navbar" role="banner">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  
  <div class="container header__inner">
    <!-- Logo -->
    <a href="/" class="header__logo" aria-label="The Genuine Love Project - Home">
      <img src="/images/logo.svg" alt="" width="40" height="40" />
      <span class="header__logo-text">The Genuine Love Project</span>
    </a>
    
    <!-- Desktop Navigation -->
    <nav class="header__nav" aria-label="Main navigation">
      <ul class="header__nav-list" role="menubar">
        <li role="none">
          <a href="/" class="header__nav-link header__nav-link--active" role="menuitem">Home</a>
        </li>
        <li role="none">
          <a href="/crm.html" class="header__nav-link" role="menuitem">Dashboard</a>
        </li>
        <li role="none">
          <a href="/content.html" class="header__nav-link" role="menuitem">Content</a>
        </li>
        <li role="none">
          <a href="/qa.html" class="header__nav-link" role="menuitem">Q&A</a>
        </li>
      </ul>
    </nav>
    
    <!-- Actions -->
    <div class="header__actions">
      <a href="/login.html" class="btn btn--outline btn--small" data-testid="link-signin">Sign In</a>
      <a href="/onboarding.html" class="btn btn--primary btn--small" data-testid="link-getstarted">Get Started</a>
      
      <!-- Mobile Menu Toggle -->
      <button 
        class="header__menu-btn" 
        aria-label="Toggle menu" 
        aria-expanded="false"
        aria-controls="mobile-menu"
        data-testid="button-menu-toggle"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
  
  <!-- Mobile Menu (hidden by default) -->
  <nav id="mobile-menu" class="header__mobile-menu" aria-label="Mobile navigation" hidden>
    <ul class="header__mobile-list">
      <li><a href="/" class="header__mobile-link">Home</a></li>
      <li><a href="/crm.html" class="header__mobile-link">Dashboard</a></li>
      <li><a href="/content.html" class="header__mobile-link">Content</a></li>
      <li><a href="/qa.html" class="header__mobile-link">Q&A</a></li>
      <li><a href="/login.html" class="header__mobile-link">Sign In</a></li>
    </ul>
  </nav>
</header>

<!-- 
  CSS DEPENDENCIES: 
  - .header { position: sticky; top: 0; z-index: 100; }
  - .header__nav { display: none; } @media (min-width: 768px) { display: flex; }
  - .header__menu-btn { display: flex; } @media (min-width: 768px) { display: none; }
  
  JS DEPENDENCIES:
  - Toggle mobile menu on button click
  - Set aria-expanded state
  - Close menu on escape key
-->
