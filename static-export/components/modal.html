<!-- 
  COMPONENT: Modal Dialog
  DESCRIPTION: Reusable modal for login, help, subscribe, confirmations
  VARIANTS: default, login, subscribe, confirm
  FIGMA LAYER: Modal / Dialog
  CLASSES: .modal, .modal__overlay, .modal__content, .modal__header, .modal__body
-->

<!-- Login Modal -->
<div 
  class="modal" 
  id="login-modal" 
  role="dialog" 
  aria-modal="true" 
  aria-labelledby="modal-title-login"
  hidden
>
  <div class="modal__overlay" data-close-modal></div>
  <div class="modal__content">
    <div class="modal__header">
      <h2 id="modal-title-login" class="modal__title">Welcome Back</h2>
      <button class="modal__close" aria-label="Close modal" data-close-modal>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="modal__body">
      <form class="form" id="login-form">
        <div class="form-group">
          <label for="login-email" class="form-label">Email</label>
          <input 
            type="email" 
            id="login-email" 
            class="form-input" 
            placeholder="you@example.com" 
            required 
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <input 
            type="password" 
            id="login-password" 
            class="form-input" 
            placeholder="Your password" 
            required 
            autocomplete="current-password"
          />
        </div>
        <div class="form-group form-group--checkbox">
          <input type="checkbox" id="remember-me" class="form-checkbox" />
          <label for="remember-me" class="form-label--checkbox">Remember me</label>
        </div>
        <button type="submit" class="btn btn--primary btn--large btn--full">Sign In</button>
      </form>
      <div class="modal__divider">
        <span>or continue with</span>
      </div>
      <div class="modal__social">
        <button class="btn btn--social" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Google
        </button>
        <button class="btn btn--social" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#333" aria-hidden="true"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          GitHub
        </button>
      </div>
    </div>
    <div class="modal__footer">
      <p>Don't have an account? <a href="/onboarding.html">Get Started</a></p>
    </div>
  </div>
</div>

<!-- Subscribe Modal -->
<div 
  class="modal" 
  id="subscribe-modal" 
  role="dialog" 
  aria-modal="true" 
  aria-labelledby="modal-title-subscribe"
  hidden
>
  <div class="modal__overlay" data-close-modal></div>
  <div class="modal__content modal__content--small">
    <div class="modal__header">
      <h2 id="modal-title-subscribe" class="modal__title">Stay Connected</h2>
      <button class="modal__close" aria-label="Close modal" data-close-modal>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
    <div class="modal__body">
      <p class="modal__text">Receive weekly healing insights and wellness tips.</p>
      <form class="form" id="subscribe-form">
        <div class="form-group">
          <label for="subscribe-email" class="form-label sr-only">Email</label>
          <input 
            type="email" 
            id="subscribe-email" 
            class="form-input" 
            placeholder="Enter your email" 
            required 
          />
        </div>
        <button type="submit" class="btn btn--primary btn--full">Subscribe</button>
      </form>
    </div>
  </div>
</div>

<!-- 
  JS: Modal Controller
  - Open: document.getElementById('login-modal').hidden = false;
  - Close: document.getElementById('login-modal').hidden = true;
  - Focus trap inside modal when open
  - Close on Escape key
  - Close on overlay click
-->
