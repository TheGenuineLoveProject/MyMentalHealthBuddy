<!-- 
  COMPONENT: Event Booking Calendar
  DESCRIPTION: Calendar interface for scheduling wellness sessions
  VARIANTS: month-view, week-view, compact
  FIGMA LAYER: Calendar / BookingCalendar
  CLASSES: .calendar, .calendar__header, .calendar__grid, .calendar__day
-->

<!-- Month View Calendar -->
<div class="calendar calendar--month" data-testid="calendar-month">
  <header class="calendar__header">
    <button class="calendar__nav calendar__nav--prev" aria-label="Previous month">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h3 class="calendar__title">January 2026</h3>
    <button class="calendar__nav calendar__nav--next" aria-label="Next month">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </header>
  
  <div class="calendar__weekdays" role="row">
    <span class="calendar__weekday">Sun</span>
    <span class="calendar__weekday">Mon</span>
    <span class="calendar__weekday">Tue</span>
    <span class="calendar__weekday">Wed</span>
    <span class="calendar__weekday">Thu</span>
    <span class="calendar__weekday">Fri</span>
    <span class="calendar__weekday">Sat</span>
  </div>
  
  <div class="calendar__grid" role="grid" aria-label="January 2026">
    <button class="calendar__day calendar__day--other" disabled>29</button>
    <button class="calendar__day calendar__day--other" disabled>30</button>
    <button class="calendar__day calendar__day--other" disabled>31</button>
    <button class="calendar__day">1</button>
    <button class="calendar__day">2</button>
    <button class="calendar__day">3</button>
    <button class="calendar__day">4</button>
    <button class="calendar__day">5</button>
    <button class="calendar__day">6</button>
    <button class="calendar__day">7</button>
    <button class="calendar__day">8</button>
    <button class="calendar__day">9</button>
    <button class="calendar__day">10</button>
    <button class="calendar__day">11</button>
    <button class="calendar__day">12</button>
    <button class="calendar__day">13</button>
    <button class="calendar__day">14</button>
    <button class="calendar__day calendar__day--has-event" aria-label="15, has available sessions">
      15
      <span class="calendar__dot" aria-hidden="true"></span>
    </button>
    <button class="calendar__day">16</button>
    <button class="calendar__day">17</button>
    <button class="calendar__day">18</button>
    <button class="calendar__day">19</button>
    <button class="calendar__day calendar__day--today calendar__day--selected" aria-current="date" aria-selected="true">20</button>
    <button class="calendar__day calendar__day--has-event" aria-label="21, has available sessions">
      21
      <span class="calendar__dot" aria-hidden="true"></span>
    </button>
    <button class="calendar__day">22</button>
    <button class="calendar__day calendar__day--has-event">
      23
      <span class="calendar__dot" aria-hidden="true"></span>
    </button>
    <button class="calendar__day">24</button>
    <button class="calendar__day">25</button>
    <button class="calendar__day">26</button>
    <button class="calendar__day">27</button>
    <button class="calendar__day">28</button>
    <button class="calendar__day">29</button>
    <button class="calendar__day">30</button>
    <button class="calendar__day">31</button>
  </div>
</div>

<!-- Time Slot Selection -->
<div class="calendar__slots" data-testid="calendar-slots">
  <h4 class="calendar__slots-title">Available Sessions — January 20</h4>
  <div class="calendar__slots-grid">
    <button class="calendar__slot" data-time="09:00">
      <span class="calendar__slot-time">9:00 AM</span>
      <span class="calendar__slot-type">AI Therapy</span>
    </button>
    <button class="calendar__slot" data-time="10:00">
      <span class="calendar__slot-time">10:00 AM</span>
      <span class="calendar__slot-type">Wellness Check</span>
    </button>
    <button class="calendar__slot calendar__slot--selected" data-time="11:00">
      <span class="calendar__slot-time">11:00 AM</span>
      <span class="calendar__slot-type">Journal Session</span>
    </button>
    <button class="calendar__slot" data-time="14:00">
      <span class="calendar__slot-time">2:00 PM</span>
      <span class="calendar__slot-type">AI Therapy</span>
    </button>
    <button class="calendar__slot" data-time="15:00">
      <span class="calendar__slot-time">3:00 PM</span>
      <span class="calendar__slot-type">Mindfulness</span>
    </button>
    <button class="calendar__slot" data-time="16:00">
      <span class="calendar__slot-time">4:00 PM</span>
      <span class="calendar__slot-type">Wellness Check</span>
    </button>
  </div>
  <button class="btn btn--primary calendar__confirm" data-testid="calendar-confirm">
    Confirm Booking
  </button>
</div>

<!-- 
  CSS DEPENDENCIES:
  
  .calendar {
    background: white;
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(47, 93, 93, 0.08);
  }
  
  .calendar__header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  
  .calendar__title {
    font-family: var(--font-serif);
    font-size: 1.25rem;
    color: var(--teal);
  }
  
  .calendar__nav {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(143, 191, 159, 0.3);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--teal);
  }
  
  .calendar__weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }
  
  .calendar__weekday {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--charcoal);
    opacity: 0.6;
    padding: 8px 0;
  }
  
  .calendar__grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  
  .calendar__day {
    aspect-ratio: 1;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 0.875rem;
    color: var(--charcoal);
    cursor: pointer;
    position: relative;
  }
  
  .calendar__day:hover {
    background: var(--sage-light);
  }
  
  .calendar__day--today {
    font-weight: 600;
    color: var(--teal);
  }
  
  .calendar__day--selected {
    background: var(--sage);
    color: white;
  }
  
  .calendar__day--other {
    opacity: 0.3;
  }
  
  .calendar__dot {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: var(--gold);
    border-radius: 50%;
  }
  
  .calendar__slots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin: 16px 0;
  }
  
  .calendar__slot {
    padding: 12px;
    border: 2px solid rgba(143, 191, 159, 0.3);
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    text-align: left;
  }
  
  .calendar__slot--selected {
    border-color: var(--sage);
    background: var(--sage-light);
  }
  
  .calendar__slot-time {
    display: block;
    font-weight: 600;
    color: var(--teal);
  }
  
  .calendar__slot-type {
    font-size: 0.75rem;
    color: var(--charcoal);
  }
-->
