<!-- 
  COMPONENT: Form Elements
  DESCRIPTION: Reusable form components with validation states
  VARIANTS: text, email, password, textarea, select, checkbox, radio
  FIGMA LAYER: Form / Input
  CLASSES: .form, .form-group, .form-label, .form-input, .form-error
-->

<!-- Standard Text Input -->
<div class="form-group">
  <label for="field-name" class="form-label">Full Name</label>
  <input 
    type="text" 
    id="field-name" 
    class="form-input" 
    placeholder="Enter your name"
    aria-describedby="field-name-hint"
    data-testid="input-name"
  />
  <span id="field-name-hint" class="form-hint">As it appears on your ID</span>
</div>

<!-- Email Input with Icon -->
<div class="form-group form-group--icon">
  <label for="field-email" class="form-label">Email Address</label>
  <div class="form-input-wrapper">
    <svg class="form-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
    </svg>
    <input 
      type="email" 
      id="field-email" 
      class="form-input form-input--with-icon" 
      placeholder="you@example.com"
      required
      autocomplete="email"
      data-testid="input-email"
    />
  </div>
</div>

<!-- Password Input with Toggle -->
<div class="form-group form-group--password">
  <label for="field-password" class="form-label">Password</label>
  <div class="form-input-wrapper">
    <input 
      type="password" 
      id="field-password" 
      class="form-input" 
      placeholder="Create a password"
      required
      minlength="8"
      autocomplete="new-password"
      data-testid="input-password"
    />
    <button type="button" class="form-toggle-password" aria-label="Show password">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
      </svg>
    </button>
  </div>
  <div class="form-password-strength" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="form-password-strength__bar"></div>
  </div>
</div>

<!-- Textarea -->
<div class="form-group">
  <label for="field-message" class="form-label">Your Message</label>
  <textarea 
    id="field-message" 
    class="form-textarea" 
    placeholder="Share your thoughts..."
    rows="4"
    data-testid="input-message"
  ></textarea>
  <span class="form-char-count"><span id="char-count">0</span>/500</span>
</div>

<!-- Select Dropdown -->
<div class="form-group">
  <label for="field-topic" class="form-label">Select a Topic</label>
  <select id="field-topic" class="form-select" data-testid="select-topic">
    <option value="" disabled selected>Choose an option</option>
    <option value="healing">Healing Journey</option>
    <option value="mindfulness">Mindfulness</option>
    <option value="growth">Personal Growth</option>
    <option value="relationships">Relationships</option>
  </select>
</div>

<!-- Checkbox Group -->
<fieldset class="form-fieldset">
  <legend class="form-legend">Interests</legend>
  <div class="form-group form-group--checkbox">
    <input type="checkbox" id="interest-meditation" class="form-checkbox" />
    <label for="interest-meditation" class="form-label--checkbox">Meditation</label>
  </div>
  <div class="form-group form-group--checkbox">
    <input type="checkbox" id="interest-journaling" class="form-checkbox" />
    <label for="interest-journaling" class="form-label--checkbox">Journaling</label>
  </div>
  <div class="form-group form-group--checkbox">
    <input type="checkbox" id="interest-therapy" class="form-checkbox" />
    <label for="interest-therapy" class="form-label--checkbox">AI Therapy</label>
  </div>
</fieldset>

<!-- Radio Group -->
<fieldset class="form-fieldset">
  <legend class="form-legend">Experience Level</legend>
  <div class="form-group form-group--radio">
    <input type="radio" id="level-beginner" name="level" class="form-radio" value="beginner" />
    <label for="level-beginner" class="form-label--radio">Beginner</label>
  </div>
  <div class="form-group form-group--radio">
    <input type="radio" id="level-intermediate" name="level" class="form-radio" value="intermediate" />
    <label for="level-intermediate" class="form-label--radio">Intermediate</label>
  </div>
  <div class="form-group form-group--radio">
    <input type="radio" id="level-advanced" name="level" class="form-radio" value="advanced" />
    <label for="level-advanced" class="form-label--radio">Advanced</label>
  </div>
</fieldset>

<!-- Error State Example -->
<div class="form-group form-group--error">
  <label for="field-error-example" class="form-label">Email (Error State)</label>
  <input 
    type="email" 
    id="field-error-example" 
    class="form-input form-input--error" 
    value="invalid-email"
    aria-invalid="true"
    aria-describedby="field-error-message"
  />
  <span id="field-error-message" class="form-error" role="alert">
    Please enter a valid email address
  </span>
</div>

<!-- 
  CSS DEPENDENCIES:
  - .form-input { border: 2px solid var(--border); border-radius: var(--radius-md); }
  - .form-input:focus { border-color: var(--gold); outline: none; }
  - .form-input--error { border-color: #ef4444; }
  - .form-error { color: #ef4444; font-size: 0.875rem; }
-->
