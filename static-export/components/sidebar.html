<!-- 
  COMPONENT: CRM Sidebar Navigation
  DESCRIPTION: Responsive sidebar for dashboard navigation
  BREAKPOINTS: Collapsed (<768px), Expanded (768px+)
  FIGMA LAYER: Sidebar / Navigation
  CLASSES: .sidebar, .sidebar--collapsed, .sidebar__nav, .sidebar__link
-->

<aside class="sidebar" id="sidebar" role="navigation" aria-label="Dashboard navigation">
  <!-- Sidebar Header -->
  <div class="sidebar__header">
    <a href="/" class="sidebar__logo" aria-label="Home">
      <img src="/images/logo.svg" alt="" width="32" height="32" />
      <span class="sidebar__logo-text">TGLP</span>
    </a>
    <button 
      class="sidebar__toggle" 
      aria-label="Toggle sidebar" 
      aria-expanded="true"
      aria-controls="sidebar-nav"
      data-testid="button-toggle-sidebar"
    >
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
    </button>
  </div>

  <!-- Primary Navigation -->
  <nav id="sidebar-nav" class="sidebar__nav">
    <ul class="sidebar__list" role="menubar">
      <li role="none">
        <a href="/home.html" class="sidebar__link" role="menuitem" data-testid="link-sidebar-home">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span class="sidebar__label">Home</span>
        </a>
      </li>
      
      <li role="none">
        <a href="/crm.html" class="sidebar__link sidebar__link--active" role="menuitem" aria-current="page" data-testid="link-sidebar-dashboard">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span class="sidebar__label">Dashboard</span>
        </a>
      </li>
      
      <li role="none">
        <a href="/content.html" class="sidebar__link" role="menuitem" data-testid="link-sidebar-content">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <span class="sidebar__label">Content</span>
        </a>
      </li>
      
      <li role="none">
        <a href="#" class="sidebar__link" role="menuitem" data-testid="link-sidebar-journal">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          <span class="sidebar__label">Journal</span>
        </a>
      </li>
      
      <li role="none">
        <a href="#" class="sidebar__link" role="menuitem" data-testid="link-sidebar-therapy">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="sidebar__label">AI Therapy</span>
        </a>
      </li>
      
      <li role="none">
        <a href="/qa.html" class="sidebar__link" role="menuitem" data-testid="link-sidebar-qa">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span class="sidebar__label">Q&A</span>
        </a>
      </li>
      
      <li role="none">
        <a href="/blog.html" class="sidebar__link" role="menuitem" data-testid="link-sidebar-blog">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          <span class="sidebar__label">Blog</span>
        </a>
      </li>
    </ul>
    
    <!-- Divider -->
    <hr class="sidebar__divider" aria-hidden="true" />
    
    <!-- Secondary Navigation -->
    <ul class="sidebar__list sidebar__list--secondary" role="menubar">
      <li role="none">
        <a href="#" class="sidebar__link" role="menuitem" data-testid="link-sidebar-progress">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <line x1="12" y1="20" x2="12" y2="10"/>
            <line x1="18" y1="20" x2="18" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="16"/>
          </svg>
          <span class="sidebar__label">Progress</span>
        </a>
      </li>
      
      <li role="none">
        <a href="#" class="sidebar__link" role="menuitem" data-testid="link-sidebar-settings">
          <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="sidebar__label">Settings</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- User Profile -->
  <div class="sidebar__footer">
    <div class="sidebar__user">
      <div class="sidebar__avatar" aria-hidden="true">
        <span>JD</span>
      </div>
      <div class="sidebar__user-info">
        <span class="sidebar__user-name">Jane Doe</span>
        <span class="sidebar__user-plan">Premium Member</span>
      </div>
    </div>
    <a href="/login.html" class="sidebar__link sidebar__link--logout" data-testid="link-sidebar-logout">
      <svg class="sidebar__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span class="sidebar__label">Sign Out</span>
    </a>
  </div>
</aside>

<!-- 
  CSS DEPENDENCIES:
  
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 240px;
    background: var(--cream);
    border-right: 1px solid rgba(143, 191, 159, 0.2);
    display: flex;
    flex-direction: column;
    z-index: 50;
    transition: width 0.3s ease;
  }
  
  .sidebar--collapsed {
    width: 72px;
  }
  
  .sidebar--collapsed .sidebar__label,
  .sidebar--collapsed .sidebar__logo-text,
  .sidebar--collapsed .sidebar__user-info {
    display: none;
  }
  
  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
    }
    .sidebar--open {
      transform: translateX(0);
    }
  }
  
  .sidebar__link {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    color: var(--charcoal);
    border-radius: 8px;
    transition: background 0.2s, color 0.2s;
  }
  
  .sidebar__link:hover {
    background: rgba(143, 191, 159, 0.15);
    color: var(--teal);
  }
  
  .sidebar__link--active {
    background: var(--sage-light);
    color: var(--teal);
    font-weight: 500;
  }
  
  JS DEPENDENCIES:
  - Toggle collapsed state on button click
  - Mobile: toggle .sidebar--open class
  - Store preference in localStorage
-->
