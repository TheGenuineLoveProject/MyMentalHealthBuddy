<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your account - The Genuine Love Project">
  <title>Log In - The Genuine Love Project</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: linear-gradient(135deg, var(--sage-light) 0%, var(--rose-light) 50%, var(--cream) 100%);
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 2.5rem;
      max-width: 440px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .auth-logo img {
      height: 48px;
    }
    .auth-logo-text {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--teal);
    }
    .auth-title {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }
    .auth-subtitle {
      color: var(--charcoal);
      opacity: 0.75;
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--charcoal);
      opacity: 0.5;
      font-size: 0.875rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.875rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-lg);
      font-weight: 500;
      color: var(--charcoal);
      transition: all 0.2s ease;
      margin-bottom: 0.75rem;
    }
    .social-btn:hover {
      border-color: var(--sage);
      background: var(--sage-light);
    }
    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .auth-footer p {
      font-size: 0.9375rem;
      color: var(--charcoal);
    }
    .auth-footer a {
      color: var(--teal);
      font-weight: 600;
    }
    .auth-footer a:hover {
      color: var(--sage);
    }
    .form-checkbox {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .form-checkbox input {
      width: 18px;
      height: 18px;
      accent-color: var(--teal);
    }
    .form-checkbox label {
      font-size: 0.875rem;
      color: var(--charcoal);
    }
    .form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .forgot-link {
      font-size: 0.875rem;
      color: var(--teal);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content" class="auth-page">
    <div class="auth-card" role="form" aria-labelledby="login-title">
      <div class="auth-header">
        <a href="index.html" class="auth-logo" aria-label="The Genuine Love Project - Home">
          <img src="images/logo.svg" alt="">
          <span class="auth-logo-text">TGLP</span>
        </a>
        <h1 id="login-title" class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Continue your wellness journey</p>
      </div>

      <!-- Social Login Buttons -->
      <button class="social-btn" data-testid="button-login-google">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Continue with Google
      </button>

      <button class="social-btn" data-testid="button-login-github">
        <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
        </svg>
        Continue with GitHub
      </button>

      <div class="auth-divider">or</div>

      <!-- Email Login Form -->
      <form action="home.html" method="get">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="you@example.com"
            required
            aria-required="true"
            data-testid="input-email"
          >
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            aria-required="true"
            data-testid="input-password"
          >
        </div>

        <div class="form-row">
          <div class="form-checkbox">
            <input type="checkbox" id="remember" name="remember" data-testid="checkbox-remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#" class="forgot-link" data-testid="link-forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn--primary btn--large" style="width: 100%;" data-testid="button-submit-login">
          Log In
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="onboarding.html" data-testid="link-signup">Sign up</a></p>
      </div>

      <p style="text-align: center; font-size: 0.75rem; color: var(--charcoal); opacity: 0.5; margin-top: 1.5rem;">
        By continuing, you agree to our 
        <a href="#" style="color: var(--teal);">Terms of Service</a> and 
        <a href="#" style="color: var(--teal);">Privacy Policy</a>
      </p>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
