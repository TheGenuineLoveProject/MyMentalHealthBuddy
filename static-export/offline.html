<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | The Genuine Love Project</title>
  <style>
    :root {
      --sage: #8fbf9f;
      --teal: #2f5d5d;
      --cream: #faf9f7;
      --charcoal: #3a3a3a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', system-ui, sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .offline-container {
      max-width: 400px;
    }
    .offline-icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      color: var(--sage);
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      color: var(--teal);
      font-size: 1.75rem;
      margin-bottom: 1rem;
    }
    p {
      color: var(--charcoal);
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--teal);
      color: white;
      text-decoration: none;
      border-radius: 24px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <svg class="offline-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 22c-4.97 0-9-2.24-9-5s4.03-5 9-5 9 2.24 9 5-4.03 5-9 5Z"/>
      <path d="M12 12c0-5.52 2.24-10 5-10s5 4.48 5 10"/>
      <path d="M12 12c0-5.52-2.24-10-5-10S2 6.48 2 12"/>
      <path d="M12 2v10"/>
    </svg>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Take a deep breath — we'll be here when you're back online.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
