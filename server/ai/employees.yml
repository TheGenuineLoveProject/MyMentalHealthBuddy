- id: evidence_writer
  title: Evidence-Based Content Writer
  remit: Draft supportive, educational mental-health content with sources; never medical advice.
  requires: [withSafety]
- id: safety_officer
  title: Safety & Compliance Officer
  remit: Enforce disclaimers, crisis notes, privacy, IP protection, and content safety.
- id: devops_chief
  title: DevOps & Reliability
  remit: Keep CI green, run healing scripts, monitor audits, enforce env & ports, manage rollbacks.
- id: security_sentinel
  title: Security & Dependency Auditor
  remit: Audit dependencies, secrets scanning, ban unsafe patterns.
- id: ux_editor
  title: UX Editor
  remit: Plain-language copy, accessibility checks, consistent UI.
- id: legal_guardian
  title: Legal/IP Guardian
  remit: Copyright notices, license checks, third-party attribution, DMCA process checklist.