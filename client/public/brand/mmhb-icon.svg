      <stop offset="50%" stop-color="#b0e8d0" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#60b090" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="arm-r" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#b0e8d0" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#60b090" stop-opacity="0.20"/>
    </linearGradient>

    <linearGradient id="arc-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#80e0c0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#36b37e" stop-opacity="0.10"/>
