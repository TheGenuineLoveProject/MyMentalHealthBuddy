  <circle cx="243" cy="148" r="4.8" fill="rgba(255,255,255,0.55)"/>
  <circle cx="265" cy="151" r="3.2" fill="rgba(255,255,255,0.35)"/>
  <path d="M244,170 Q254,177 264,171" fill="none" stroke="rgba(255,255,255,0.42)" stroke-width="2.4" stroke-linecap="round"/>

  <ellipse cx="256" cy="302" rx="30" ry="28" fill="#fffbe0" opacity="0.85" filter="url(#bloom-h)"/>
  <ellipse cx="256" cy="302" rx="16" ry="15" fill="#fff8d0" opacity="0.95"/>
  <ellipse cx="256" cy="302" rx="8" ry="7" fill="#ffffff" opacity="0.98"/>
  <circle cx="256" cy="301" r="3" fill="#ffffff"/>

  <g opacity="0.32" filter="url(#particle-glow)">
    <circle cx="168" cy="168" r="3.2" fill="#80e0c0"/>
    <circle cx="348" cy="182" r="2.6" fill="#90e8c8"/>
    <circle cx="145" cy="298" r="2.4" fill="#80d8b0"/>
    <circle cx="370" cy="318" r="3.0" fill="#90e0c0"/>
    <circle cx="188" cy="412" r="2.2" fill="#78d0a8"/>
    <circle cx="332" cy="422" r="2.4" fill="#88d8b4"/>
    <circle cx="130" cy="238" r="1.8" fill="#c8952e"/>
