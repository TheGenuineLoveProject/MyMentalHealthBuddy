<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#68d0a8"/>
      <stop offset="20%" stop-color="#48b88c"/>
      <stop offset="55%" stop-color="#286858"/>
      <stop offset="100%" stop-color="#163d3d"/>
    </linearGradient>
    <radialGradient id="bg-shine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#90e8c4" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#48b88c" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#163d3d" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-ambient" cx="50%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#dab24c" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#163d3d" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-mid" cx="50%" cy="60%" r="16%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#ffd860" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#dab24c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-crown" cx="50%" cy="25%" r="28%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dab24c" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="head-fill" cx="42%" cy="36%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="45%" stop-color="#d0f4e4" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#88d0b0" stop-opacity="0.80"/>
    </radialGradient>

    <linearGradient id="body-fill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e0f6ec" stop-opacity="0.94"/>
      <stop offset="30%" stop-color="#a8e0c8" stop-opacity="0.74"/>
      <stop offset="65%" stop-color="#68c0a0" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#48a080" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="arm-l" x1="90%" y1="10%" x2="10%" y2="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="50%" stop-color="#b0e8d0" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#60b090" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="arm-r" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="50%" stop-color="#b0e8d0" stop-opacity="0.56"/>
      <stop offset="100%" stop-color="#60b090" stop-opacity="0.20"/>
    </linearGradient>

    <linearGradient id="arc-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#90e0c0" stop-opacity="0.40"/>
      <stop offset="100%" stop-color="#48b88c" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="arc-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dab24c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffe8a0" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="arc-rose" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0a09c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#e0a09c" stop-opacity="0.05"/>
    </linearGradient>

    <filter id="soft-body" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="soft-arm" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <filter id="bloom-w" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="bloom-m" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="bloom-h" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="soft-head" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
    <filter id="arc-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
    <filter id="particle-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-shine)"/>

  <g filter="url(#arc-blur)" opacity="0.40">
    <circle cx="256" cy="290" r="150" fill="none" stroke="url(#arc-stroke)" stroke-width="1.2" stroke-dasharray="8 12"/>
    <circle cx="256" cy="300" r="130" fill="none" stroke="url(#arc-stroke)" stroke-width="1.8"/>
    <circle cx="256" cy="300" r="105" fill="none" stroke="url(#arc-stroke)" stroke-width="1.2"/>
    <path d="M160,230 A120,120 0 0,1 352,230" fill="none" stroke="url(#arc-stroke)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M175,370 A110,80 0 0,0 337,370" fill="none" stroke="url(#arc-stroke)" stroke-width="1"/>
  </g>

  <g filter="url(#arc-blur)" opacity="0.22">
    <path d="M140,200 A140,140 0 0,1 372,200" fill="none" stroke="url(#arc-gold)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M190,380 A100,60 0 0,0 322,380" fill="none" stroke="url(#arc-rose)" stroke-width="1.2"/>
    <circle cx="256" cy="280" r="170" fill="none" stroke="url(#arc-gold)" stroke-width="0.8" stroke-dasharray="4 16"/>
  </g>

  <ellipse cx="256" cy="140" rx="100" ry="80" fill="url(#glow-crown)" filter="url(#bloom-w)"/>
  <ellipse cx="256" cy="310" rx="180" ry="160" fill="url(#glow-ambient)" filter="url(#bloom-w)"/>
  <ellipse cx="256" cy="308" rx="90" ry="82" fill="url(#glow-mid)" filter="url(#bloom-m)"/>

  <g filter="url(#soft-body)">
    <path d="M256,200 C240,204 218,216 206,236 C192,260 186,288 192,314 C196,334 208,352 224,366 C236,376 248,382 256,384 C264,382 276,376 288,366 C304,352 316,334 320,314 C326,288 320,260 306,236 C294,216 272,204 256,200Z" fill="url(#body-fill)"/>
  </g>

  <g filter="url(#soft-arm)">
    <path d="M238,214 C224,220 208,236 198,258 C188,280 186,302 194,318 C202,332 214,336 226,330 C236,324 242,312 244,298 C246,286 244,270 242,254 C240,240 238,226 238,214Z" fill="url(#arm-l)"/>
    <path d="M274,214 C288,220 304,236 314,258 C324,280 326,302 318,318 C310,332 298,336 286,330 C276,324 270,312 268,298 C266,286 268,270 270,254 C272,240 274,226 274,214Z" fill="url(#arm-r)"/>
  </g>

  <g opacity="0.30" filter="url(#soft-body)">
    <path d="M232,362 C242,374 250,380 256,382 C262,380 270,374 280,362 C290,350 298,336 302,322 L256,340 L210,322 C214,336 222,350 232,362Z" fill="rgba(255,255,255,0.45)"/>
  </g>

  <g filter="url(#soft-head)">
    <circle cx="253" cy="160" r="40" fill="url(#head-fill)"/>
  </g>

  <circle cx="244" cy="150" r="4.5" fill="rgba(255,255,255,0.52)"/>
  <circle cx="264" cy="153" r="3" fill="rgba(255,255,255,0.32)"/>
  <path d="M245,172 Q253,178 262,173" fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="2.2" stroke-linecap="round"/>

  <ellipse cx="256" cy="306" rx="28" ry="26" fill="#fffbe0" opacity="0.82" filter="url(#bloom-h)"/>
  <ellipse cx="256" cy="306" rx="15" ry="14" fill="#fff8d0" opacity="0.94"/>
  <ellipse cx="256" cy="306" rx="7" ry="6.5" fill="#ffffff" opacity="0.98"/>
  <circle cx="256" cy="305" r="2.8" fill="#ffffff"/>

  <g opacity="0.30" filter="url(#particle-glow)">
    <circle cx="170" cy="170" r="3" fill="#a8e8d0"/>
    <circle cx="345" cy="185" r="2.5" fill="#98e8c0"/>
    <circle cx="148" cy="300" r="2.2" fill="#90e0b8"/>
    <circle cx="366" cy="320" r="2.8" fill="#a0e8c4"/>
    <circle cx="190" cy="410" r="2" fill="#88d8b0"/>
    <circle cx="330" cy="420" r="2.2" fill="#90e0b8"/>
    <circle cx="135" cy="240" r="1.6" fill="#dab24c"/>
    <circle cx="378" cy="250" r="1.8" fill="#dab24c"/>
    <circle cx="200" cy="140" r="1.4" fill="#e0a09c"/>
    <circle cx="310" cy="130" r="1.6" fill="#e0a09c"/>
    <circle cx="256" cy="100" r="2" fill="#ffe8a0"/>
    <circle cx="220" cy="430" r="1.5" fill="#b0e8d4"/>
    <circle cx="290" cy="435" r="1.3" fill="#a0dcc4"/>
  </g>

  <g opacity="0.18">
    <circle cx="180" cy="180" r="2.5" fill="#b0f0d4"/>
    <circle cx="340" cy="195" r="2" fill="#98e8c0"/>
    <circle cx="155" cy="310" r="1.8" fill="#90e0b8"/>
    <circle cx="360" cy="330" r="2.2" fill="#a0e8c4"/>
    <circle cx="200" cy="400" r="1.5" fill="#88d8b0"/>
    <circle cx="320" cy="410" r="1.8" fill="#90e0b8"/>
  </g>
</svg>
