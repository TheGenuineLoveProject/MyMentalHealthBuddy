    <linearGradient id="arc-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b90d0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7c6fbd" stop-opacity="0.06"/>
