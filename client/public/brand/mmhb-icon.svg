<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ac89a"/>
      <stop offset="18%" stop-color="#36b37e"/>
      <stop offset="50%" stop-color="#1a6060"/>
      <stop offset="100%" stop-color="#0f3d3e"/>
    </linearGradient>
    <radialGradient id="bg-shine" cx="28%" cy="22%" r="60%">
      <stop offset="0%" stop-color="#80e8c0" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#36b37e" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0f3d3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-violet-accent" cx="72%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#7c6fbd" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0f3d3e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-heart" cx="50%" cy="58%" r="32%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.60"/>
      <stop offset="30%" stop-color="#c8952e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0f3d3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-core" cx="50%" cy="58%" r="14%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.98"/>
      <stop offset="40%" stop-color="#ffd860" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#c8952e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-crown" cx="50%" cy="22%" r="30%">
      <stop offset="0%" stop-color="#b8a8e8" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#7c6fbd" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0f3d3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-halo" cx="50%" cy="28%" r="22%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#c8952e" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="head-fill" cx="44%" cy="34%" r="56%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="40%" stop-color="#d0f0e4" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#80d0b0" stop-opacity="0.82"/>
    </radialGradient>

    <linearGradient id="body-fill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e0f6ec" stop-opacity="0.95"/>
      <stop offset="25%" stop-color="#a8e0c8" stop-opacity="0.78"/>
      <stop offset="60%" stop-color="#60c0a0" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#36b37e" stop-opacity="0.18"/>
