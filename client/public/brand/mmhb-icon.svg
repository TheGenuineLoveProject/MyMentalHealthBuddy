    <circle cx="198" cy="138" r="1.6" fill="#d4918a"/>
    <circle cx="314" cy="128" r="1.8" fill="#d4918a"/>
    <circle cx="256" cy="96" r="2.2" fill="#b8a8e8"/>
    <circle cx="180" cy="100" r="1.4" fill="#9b90d0"/>
    <circle cx="330" cy="105" r="1.2" fill="#9b90d0"/>
    <circle cx="218" cy="432" r="1.6" fill="#98e0cc"/>
    <circle cx="292" cy="438" r="1.4" fill="#90d8c0"/>
  </g>

  <g opacity="0.20">
    <circle cx="178" cy="178" r="2.6" fill="#a0f0d4"/>
    <circle cx="342" cy="192" r="2.2" fill="#90e8c0"/>
    <circle cx="152" cy="308" r="1.8" fill="#80d8b0"/>
    <circle cx="362" cy="332" r="2.4" fill="#90e0c0"/>
    <circle cx="198" cy="398" r="1.6" fill="#78d0a8"/>
    <circle cx="322" cy="408" r="2.0" fill="#88d8b4"/>
    <circle cx="140" cy="180" r="1.2" fill="#a090d0"/>
    <circle cx="372" cy="170" r="1.0" fill="#9080c8"/>
