  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-shine)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-violet-accent)"/>

  <g filter="url(#arc-blur)" opacity="0.35">
    <circle cx="256" cy="290" r="155" fill="none" stroke="url(#arc-stroke)" stroke-width="1" stroke-dasharray="6 14"/>
    <circle cx="256" cy="295" r="132" fill="none" stroke="url(#arc-stroke)" stroke-width="1.6"/>
    <circle cx="256" cy="295" r="108" fill="none" stroke="url(#arc-violet)" stroke-width="1.2"/>
    <path d="M155,225 A125,125 0 0,1 357,225" fill="none" stroke="url(#arc-stroke)" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M170,375 A115,85 0 0,0 342,375" fill="none" stroke="url(#arc-stroke)" stroke-width="0.8"/>
  </g>

  <g filter="url(#arc-blur)" opacity="0.25">
    <path d="M135,195 A145,145 0 0,1 377,195" fill="none" stroke="url(#arc-gold)" stroke-width="1.6" stroke-linecap="round"/>
    <path d="M185,385 A105,65 0 0,0 327,385" fill="none" stroke="url(#arc-rose)" stroke-width="1.0"/>
    <circle cx="256" cy="275" r="175" fill="none" stroke="url(#arc-violet)" stroke-width="0.7" stroke-dasharray="3 18"/>
    <path d="M200,120 A80,80 0 0,1 312,120" fill="none" stroke="url(#arc-gold)" stroke-width="0.6" stroke-dasharray="2 8"/>
  </g>

  <ellipse cx="256" cy="135" rx="95" ry="75" fill="url(#glow-crown)" filter="url(#bloom-w)"/>
  <ellipse cx="256" cy="145" rx="55" ry="40" fill="url(#glow-halo)" filter="url(#halo-blur)"/>
  <ellipse cx="256" cy="305" rx="185" ry="165" fill="url(#glow-heart)" filter="url(#bloom-w)"/>
  <ellipse cx="256" cy="303" rx="85" ry="78" fill="url(#glow-core)" filter="url(#bloom-m)"/>

  <g filter="url(#soft-body)">
    <path d="M256,198 C240,202 217,214 204,234 C190,258 184,286 190,312 C194,332 206,350 222,364 C234,374 247,380 256,382 C265,380 278,374 290,364 C306,350 318,332 322,312 C328,286 322,258 308,234 C295,214 272,202 256,198Z" fill="url(#body-fill)"/>
  </g>

  <g filter="url(#soft-arm)">
    <path d="M236,212 C221,218 205,234 195,256 C185,278 183,300 191,316 C199,330 211,334 223,328 C233,322 239,310 241,296 C243,284 241,268 239,252 C237,238 236,224 236,212Z" fill="url(#arm-l)"/>
    <path d="M276,212 C291,218 307,234 317,256 C327,278 329,300 321,316 C313,330 301,334 289,328 C279,322 273,310 271,296 C269,284 271,268 273,252 C275,238 276,224 276,212Z" fill="url(#arm-r)"/>
  </g>

  <g opacity="0.28" filter="url(#soft-body)">
    <path d="M230,360 C240,372 249,378 256,380 C263,378 272,372 282,360 C292,348 300,334 304,320 L256,338 L208,320 C212,334 220,348 230,360Z" fill="rgba(255,255,255,0.40)"/>
  </g>

