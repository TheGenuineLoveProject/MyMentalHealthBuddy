<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78c8a0"/>
      <stop offset="30%" stop-color="#4a9e80"/>
      <stop offset="65%" stop-color="#2e7568"/>
      <stop offset="100%" stop-color="#1e4f4f"/>
    </linearGradient>
    <radialGradient id="bg-shine" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a0e0c0" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1e4f4f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-ambient" cx="50%" cy="62%" r="32%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.50"/>
      <stop offset="40%" stop-color="#e8b840" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1e4f4f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-mid" cx="50%" cy="62%" r="15%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffd860" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-hot" cx="50%" cy="62%" r="7%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#fffae8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd860" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="head-fill" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="50%" stop-color="#e0f4ea" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#a0d4b8" stop-opacity="0.78"/>
    </radialGradient>

    <linearGradient id="body-fill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#e8f6ee" stop-opacity="0.92"/>
      <stop offset="35%" stop-color="#c0e4d0" stop-opacity="0.72"/>
      <stop offset="70%" stop-color="#88c8a8" stop-opacity="0.48"/>
      <stop offset="100%" stop-color="#5aa888" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="arm-l" x1="90%" y1="10%" x2="10%" y2="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#c8e8d8" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#78b898" stop-opacity="0.20"/>
    </linearGradient>
    <linearGradient id="arm-r" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.80"/>
      <stop offset="50%" stop-color="#c8e8d8" stop-opacity="0.54"/>
      <stop offset="100%" stop-color="#78b898" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="arc-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0e0c8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#60c0a0" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="soft-body" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="soft-arm" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <filter id="bloom-w" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="bloom-m" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
    <filter id="bloom-h" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <filter id="soft-head" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1"/>
    </filter>
    <filter id="arc-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-shine)"/>

  <g filter="url(#arc-blur)" opacity="0.45">
    <circle cx="256" cy="300" r="130" fill="none" stroke="url(#arc-stroke)" stroke-width="1.8"/>
    <circle cx="256" cy="300" r="105" fill="none" stroke="url(#arc-stroke)" stroke-width="1.2"/>
    <path d="M160,230 A120,120 0 0,1 352,230" fill="none" stroke="url(#arc-stroke)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M175,370 A110,80 0 0,0 337,370" fill="none" stroke="url(#arc-stroke)" stroke-width="1"/>
  </g>

  <ellipse cx="256" cy="310" rx="180" ry="160" fill="url(#glow-ambient)" filter="url(#bloom-w)"/>
  <ellipse cx="256" cy="308" rx="90" ry="82" fill="url(#glow-mid)" filter="url(#bloom-m)"/>

  <g filter="url(#soft-body)">
    <path d="
      M256,200
      C240,204 218,216 206,236
      C192,260 186,288 192,314
      C196,334 208,352 224,366
      C236,376 248,382 256,384
      C264,382 276,376 288,366
      C304,352 316,334 320,314
      C326,288 320,260 306,236
      C294,216 272,204 256,200Z
    " fill="url(#body-fill)"/>
  </g>

  <g filter="url(#soft-arm)">
    <path d="
      M238,214
      C224,220 208,236 198,258
      C188,280 186,302 194,318
      C202,332 214,336 226,330
      C236,324 242,312 244,298
      C246,286 244,270 242,254
      C240,240 238,226 238,214Z
    " fill="url(#arm-l)"/>
    <path d="
      M274,214
      C288,220 304,236 314,258
      C324,280 326,302 318,318
      C310,332 298,336 286,330
      C276,324 270,312 268,298
      C266,286 268,270 270,254
      C272,240 274,226 274,214Z
    " fill="url(#arm-r)"/>
  </g>

  <g opacity="0.32" filter="url(#soft-body)">
    <path d="
      M232,362
      C242,374 250,380 256,382
      C262,380 270,374 280,362
      C290,350 298,336 302,322
      L256,340 L210,322
      C214,336 222,350 232,362Z
    " fill="rgba(255,255,255,0.45)"/>
  </g>

  <g filter="url(#soft-head)">
    <circle cx="253" cy="160" r="40" fill="url(#head-fill)"/>
  </g>

  <circle cx="244" cy="150" r="4.5" fill="rgba(255,255,255,0.50)"/>
  <circle cx="264" cy="153" r="3" fill="rgba(255,255,255,0.30)"/>

  <path d="M245,172 Q253,178 262,173" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2" stroke-linecap="round"/>

  <ellipse cx="256" cy="306" rx="28" ry="26" fill="#fffbe0" opacity="0.82" filter="url(#bloom-h)"/>
  <ellipse cx="256" cy="306" rx="15" ry="14" fill="#fff8d0" opacity="0.94"/>
  <ellipse cx="256" cy="306" rx="7" ry="6.5" fill="#ffffff" opacity="0.98"/>
  <circle cx="256" cy="305" r="2.8" fill="#ffffff"/>

  <g opacity="0.22">
    <circle cx="180" cy="180" r="2.5" fill="#c8f0d8"/>
    <circle cx="340" cy="195" r="2" fill="#b0e8c8"/>
    <circle cx="155" cy="310" r="1.8" fill="#a8e0c0"/>
    <circle cx="360" cy="330" r="2.2" fill="#b8e8cc"/>
    <circle cx="200" cy="400" r="1.5" fill="#a0d8b8"/>
    <circle cx="320" cy="410" r="1.8" fill="#a8e0c0"/>
  </g>
</svg>
