<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style type="text/css"><![CDATA[
      /* Heart-core breathing — anchored at the figure's heart.
         Chains a transform/opacity breath with an independent
         filter-luminance pulse (drop-shadow warmth + slight
         brightness lift) for a subtle inner-light feel. */
      .breathe { transform-origin: 256px 298px;
                 animation: breathe 5.2s ease-in-out infinite,
                            heartGlow 5.2s ease-in-out infinite; }
      @keyframes breathe {
        0%, 100% { transform: scale(1);    opacity: 0.96; }
        50%      { transform: scale(1.06); opacity: 1.00; }
      }
      @keyframes heartGlow {
        0%, 100% { filter: drop-shadow(0 0 6px  rgba(255, 232, 168, 0.40)) brightness(1);    }
        50%      { filter: drop-shadow(0 0 14px rgba(255, 216, 120, 0.70)) brightness(1.06); }
      }
      /* Soft halo bloom around head */
      .halo-pulse { transform-origin: 256px 140px; animation: haloPulse 7s ease-in-out infinite; }
      @keyframes haloPulse {
        0%, 100% { opacity: 0.85; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.08); }
      }
      /* Aurora arcs — glacial rotation + slow hue drift on filter
         (transform and filter are independent properties, so both
         animations run simultaneously without conflict). */
      .aurora-cw  { transform-origin: 256px 285px;
                    animation: spin 90s linear infinite,
                               auroraHue 28s ease-in-out infinite; }
      .aurora-ccw { transform-origin: 256px 270px;
                    animation: spin 120s linear infinite reverse,
                               auroraHue 36s ease-in-out infinite reverse; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes auroraHue {
        0%, 100% { filter: url(#arc-blur) hue-rotate(0deg)   saturate(1);    }
        33%      { filter: url(#arc-blur) hue-rotate(8deg)   saturate(1.08); }
        66%      { filter: url(#arc-blur) hue-rotate(-8deg)  saturate(0.96); }
      }
      /* Particle twinkle — wrapped in translated <g> so the child scales
         around its own origin without needing transform-box: fill-box
         (which is unreliable on older Safari/iOS). */
      .twinkle { animation: twinkle 4.8s ease-in-out infinite; }
      .twinkle-a { animation-delay: 0s;   }
      .twinkle-b { animation-delay: 0.7s; }
      .twinkle-c { animation-delay: 1.4s; }
      .twinkle-d { animation-delay: 2.1s; }
      .twinkle-e { animation-delay: 2.8s; }
      @keyframes twinkle {
        0%, 100% { opacity: 0.18; transform: scale(0.85); }
        50%      { opacity: 1;    transform: scale(1.15); }
      }
      /* Eye blink — rare, gentle */
      .blink { transform-origin: 255px 148px; animation: blink 9s ease-in-out infinite; }
      @keyframes blink {
        0%, 92%, 100% { transform: scaleY(1); }
        95%, 97%      { transform: scaleY(0.08); }
      }
      /* Respect user motion preferences */
      @media (prefers-reduced-motion: reduce) {
        .breathe, .halo-pulse, .aurora-cw, .aurora-ccw, .twinkle, .blink {
          animation: none !important;
          transform: none !important;
        }
      }
    ]]></style>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38d49e"/>
      <stop offset="18%" stop-color="#1ec890"/>
      <stop offset="50%" stop-color="#0e4e4e"/>
      <stop offset="100%" stop-color="#062a2a"/>
    </linearGradient>
    <radialGradient id="bg-shine" cx="22%" cy="15%" r="60%">
      <stop offset="0%" stop-color="#72ecc0" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#1ec890" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#062a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-violet" cx="78%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#6c58b8" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#062a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg-gold-ambient" cx="50%" cy="52%" r="38%">
      <stop offset="0%" stop-color="#be8622" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#062a2a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-heart" cx="50%" cy="56%" r="30%">
      <stop offset="0%" stop-color="#ffe0a0" stop-opacity="0.68"/>
      <stop offset="25%" stop-color="#be8622" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#062a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-core" cx="50%" cy="56%" r="12%">
      <stop offset="0%" stop-color="#fffae4" stop-opacity="0.98"/>
      <stop offset="35%" stop-color="#ffd460" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#be8622" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-crown" cx="50%" cy="20%" r="28%">
      <stop offset="0%" stop-color="#a898d8" stop-opacity="0.22"/>
      <stop offset="45%" stop-color="#6c58b8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#062a2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-halo" cx="50%" cy="25%" r="20%">
      <stop offset="0%" stop-color="#ffe498" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#be8622" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="head-fill" cx="42%" cy="32%" r="58%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="30%" stop-color="#ccf0e2" stop-opacity="0.96"/>
      <stop offset="70%" stop-color="#82d8b4" stop-opacity="0.90"/>
      <stop offset="100%" stop-color="#50c49c" stop-opacity="0.75"/>
    </radialGradient>

    <linearGradient id="body-fill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#dcf4ea" stop-opacity="0.96"/>
      <stop offset="18%" stop-color="#a0e4c4" stop-opacity="0.84"/>
      <stop offset="50%" stop-color="#58c09c" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#1ec890" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="arm-l" x1="88%" y1="8%" x2="12%" y2="92%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#a8e8cc" stop-opacity="0.68"/>
      <stop offset="100%" stop-color="#58b48c" stop-opacity="0.22"/>
    </linearGradient>
    <linearGradient id="arm-r" x1="12%" y1="8%" x2="88%" y2="92%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="45%" stop-color="#a8e8cc" stop-opacity="0.62"/>
      <stop offset="100%" stop-color="#58b48c" stop-opacity="0.20"/>
    </linearGradient>

    <linearGradient id="arc-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#72ecc0" stop-opacity="0.34"/>
      <stop offset="100%" stop-color="#1ec890" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="arc-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9888d4" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#6c58b8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="arc-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#be8622" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="arc-rose" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d08672" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#d08672" stop-opacity="0.04"/>
    </linearGradient>

    <filter id="soft-body" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8"/>
    </filter>
    <filter id="soft-arm" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
    <filter id="bloom-w" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>
    <filter id="bloom-m" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
    <filter id="bloom-h" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
    </filter>
    <filter id="soft-head" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
    <filter id="arc-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.0"/>
    </filter>
    <filter id="particle-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2"/>
    </filter>
    <filter id="halo-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>
    <filter id="eye-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#bg-shine)"/>
  <rect width="512" height="512" rx="108" fill="url(#bg-violet)"/>
  <rect width="512" height="512" rx="108" fill="url(#bg-gold-ambient)"/>

  <!-- Aurora rings — slow counter-rotating glacial drift -->
  <g class="aurora-cw" filter="url(#arc-blur)" opacity="0.40">
    <circle cx="256" cy="285" r="160" fill="none" stroke="url(#arc-emerald)" stroke-width="1.2" stroke-dasharray="5 16"/>
    <circle cx="256" cy="288" r="135" fill="none" stroke="url(#arc-emerald)" stroke-width="1.8"/>
    <circle cx="256" cy="290" r="112" fill="none" stroke="url(#arc-violet)" stroke-width="1.4"/>
    <path d="M148,218 A130,130 0 0,1 364,218" fill="none" stroke="url(#arc-emerald)" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M168,378 A120,88 0 0,0 344,378" fill="none" stroke="url(#arc-emerald)" stroke-width="0.9"/>
  </g>

  <g class="aurora-ccw" filter="url(#arc-blur)" opacity="0.30">
    <path d="M130,190 A150,150 0 0,1 382,190" fill="none" stroke="url(#arc-gold)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M180,388 A110,68 0 0,0 332,388" fill="none" stroke="url(#arc-rose)" stroke-width="1.2"/>
    <circle cx="256" cy="270" r="180" fill="none" stroke="url(#arc-violet)" stroke-width="0.8" stroke-dasharray="3 20"/>
    <path d="M195,115 A85,85 0 0,1 317,115" fill="none" stroke="url(#arc-gold)" stroke-width="0.7" stroke-dasharray="2 10"/>
    <circle cx="256" cy="260" r="200" fill="none" stroke="url(#arc-emerald)" stroke-width="0.5" stroke-dasharray="2 25"/>
  </g>

  <!-- Crown halo with gentle pulse -->
  <g class="halo-pulse">
    <ellipse cx="256" cy="130" rx="100" ry="78" fill="url(#glow-crown)" filter="url(#bloom-w)"/>
    <ellipse cx="256" cy="140" rx="58" ry="42" fill="url(#glow-halo)" filter="url(#halo-blur)"/>
  </g>

  <!-- Body heart-glow (background bloom — also breathes for depth) -->
  <g class="breathe">
    <ellipse cx="256" cy="300" rx="190" ry="170" fill="url(#glow-heart)" filter="url(#bloom-w)"/>
    <ellipse cx="256" cy="298" rx="90" ry="82" fill="url(#glow-core)" filter="url(#bloom-m)"/>
  </g>

  <!-- Body silhouette -->
  <g filter="url(#soft-body)">
    <path d="M256,195 C238,200 214,212 200,234 C186,258 180,288 186,316 C190,338 203,356 220,370 C233,380 246,386 256,388 C266,386 279,380 292,370 C309,356 322,338 326,316 C332,288 326,258 312,234 C298,212 274,200 256,195Z" fill="url(#body-fill)"/>
  </g>

  <!-- Arms wrapping inward (the embrace) -->
  <g filter="url(#soft-arm)">
    <path d="M234,210 C218,216 201,232 190,256 C180,280 178,304 186,320 C195,336 208,340 220,334 C231,328 238,314 240,298 C242,284 240,266 238,250 C236,236 234,222 234,210Z" fill="url(#arm-l)"/>
    <path d="M278,210 C294,216 311,232 322,256 C332,280 334,304 326,320 C317,336 304,340 292,334 C281,328 274,314 272,298 C270,284 272,266 274,250 C276,236 278,222 278,210Z" fill="url(#arm-r)"/>
  </g>

  <!-- Soft chest highlight -->
  <g opacity="0.32" filter="url(#soft-body)">
    <path d="M228,364 C238,376 248,382 256,384 C264,382 274,376 284,364 C294,350 302,336 306,322 L256,340 L206,322 C210,336 218,350 228,364Z" fill="rgba(255,255,255,0.44)"/>
  </g>

  <!-- Head -->
  <g filter="url(#soft-head)">
    <circle cx="255" cy="155" r="44" fill="url(#head-fill)"/>
  </g>

  <!-- Eyes (with rare gentle blink) -->
  <g class="blink">
    <g filter="url(#eye-glow)">
      <circle cx="242" cy="145" r="6" fill="rgba(255,255,255,0.16)"/>
      <circle cx="268" cy="148" r="5" fill="rgba(255,255,255,0.13)"/>
    </g>
    <circle cx="242" cy="145" r="5.2" fill="rgba(255,255,255,0.60)"/>
    <circle cx="268" cy="148" r="3.8" fill="rgba(255,255,255,0.42)"/>
    <circle cx="241" cy="143" r="1.8" fill="rgba(255,255,255,0.88)"/>
    <circle cx="267" cy="146" r="1.2" fill="rgba(255,255,255,0.72)"/>
  </g>

  <!-- Smile -->
  <path d="M242,168 Q255,177 268,169" fill="none" stroke="rgba(255,255,255,0.50)" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M246,171 Q255,175 264,172" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Heart core (the focal pulse) -->
  <g class="breathe">
    <ellipse cx="256" cy="298" rx="32" ry="30" fill="#fffce4" opacity="0.90" filter="url(#bloom-h)"/>
    <ellipse cx="256" cy="298" rx="18" ry="17" fill="#fff8d4" opacity="0.96"/>
    <ellipse cx="256" cy="298" rx="9" ry="8" fill="#ffffff" opacity="0.98"/>
    <circle cx="256" cy="297" r="3.5" fill="#ffffff"/>
  </g>

  <!-- Twinkling particles (staggered) -->
  <g opacity="0.38" filter="url(#particle-glow)">
    <g class="twinkle twinkle-a" transform="translate(162 162)"><circle r="3.4" fill="#72ecc0"/></g>
    <g class="twinkle twinkle-c" transform="translate(352 178)"><circle r="2.8" fill="#82ecc4"/></g>
    <g class="twinkle twinkle-b" transform="translate(140 295)"><circle r="2.6" fill="#72dcac"/></g>
    <g class="twinkle twinkle-d" transform="translate(375 315)"><circle r="3.2" fill="#82e4bc"/></g>
    <g class="twinkle twinkle-e" transform="translate(185 415)"><circle r="2.4" fill="#6cd49c"/></g>
    <g class="twinkle twinkle-a" transform="translate(335 425)"><circle r="2.6" fill="#7adcb0"/></g>
    <g class="twinkle twinkle-c" transform="translate(125 235)"><circle r="2.0" fill="#be8622"/></g>
    <g class="twinkle twinkle-b" transform="translate(388 245)"><circle r="2.2" fill="#be8622"/></g>
    <g class="twinkle twinkle-d" transform="translate(195 132)"><circle r="1.8" fill="#d08672"/></g>
    <g class="twinkle twinkle-e" transform="translate(318 122)"><circle r="2.0" fill="#d08672"/></g>
    <g class="twinkle twinkle-a" transform="translate(256 90)"><circle r="2.4" fill="#b0a0e0"/></g>
    <g class="twinkle twinkle-b" transform="translate(175 95)"><circle r="1.6" fill="#9888d4"/></g>
    <g class="twinkle twinkle-c" transform="translate(335 100)"><circle r="1.4" fill="#9888d4"/></g>
    <g class="twinkle twinkle-d" transform="translate(215 435)"><circle r="1.8" fill="#88e4c4"/></g>
    <g class="twinkle twinkle-e" transform="translate(295 440)"><circle r="1.6" fill="#82dcc0"/></g>
  </g>

  <g opacity="0.24">
    <g class="twinkle twinkle-c" transform="translate(175 175)"><circle r="2.8" fill="#90f0d0"/></g>
    <g class="twinkle twinkle-a" transform="translate(345 188)"><circle r="2.4" fill="#82ecc0"/></g>
    <g class="twinkle twinkle-e" transform="translate(148 305)"><circle r="2.0" fill="#72dcac"/></g>
    <g class="twinkle twinkle-b" transform="translate(365 335)"><circle r="2.6" fill="#82e4bc"/></g>
    <g class="twinkle twinkle-d" transform="translate(195 400)"><circle r="1.8" fill="#6cd49c"/></g>
    <g class="twinkle twinkle-a" transform="translate(325 410)"><circle r="2.2" fill="#7adcb0"/></g>
    <g class="twinkle twinkle-c" transform="translate(135 176)"><circle r="1.4" fill="#a090d4"/></g>
    <g class="twinkle twinkle-e" transform="translate(378 168)"><circle r="1.2" fill="#9080c4"/></g>
    <g class="twinkle twinkle-b" transform="translate(218 82)"><circle r="1.0" fill="#c8b8e4"/></g>
    <g class="twinkle twinkle-d" transform="translate(294 78)"><circle r="0.8" fill="#c0b0dc"/></g>
  </g>
</svg>
