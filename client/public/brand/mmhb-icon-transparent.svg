<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="glow-ambient-t" cx="50%" cy="60%" r="36%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.42"/>
      <stop offset="35%" stop-color="#d4a843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
