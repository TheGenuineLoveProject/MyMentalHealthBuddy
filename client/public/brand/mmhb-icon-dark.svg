  <rect width="512" height="512" rx="112" fill="url(#bg-d)"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-aura-d)"/>

  <ellipse cx="256" cy="308" rx="210" ry="180" fill="url(#glow-ambient-d)" filter="url(#bloom-wide-d)"/>
  <ellipse cx="256" cy="305" rx="105" ry="95" fill="url(#glow-mid-d)" filter="url(#bloom-mid-d)"/>

  <g filter="url(#soft-body-d)">
    <path d="
      M256,192
      C238,196 212,212 198,238
      C182,268 176,302 184,332
      C190,355 204,374 222,388
      C238,400 248,406 256,408
      C264,406 274,400 290,388
      C308,374 322,355 328,332
      C336,302 330,268 314,238
      C300,212 274,196 256,192Z
    " fill="url(#body-grad-d)"/>
  </g>

  <g filter="url(#soft-arm-d)">
    <path d="
      M238,208
      C222,216 204,234 192,258
      C180,282 176,306 184,324
      C192,340 206,346 220,340
      C232,334 240,320 244,304
      C246,292 245,276 242,260
      C240,244 238,224 238,208Z
    " fill="url(#arm-grad-l-d)"/>
    <path d="
      M274,208
      C290,216 308,234 320,258
      C332,282 336,306 328,324
      C320,340 306,346 292,340
      C280,334 272,320 268,304
      C266,292 267,276 270,260
      C272,244 274,224 274,208Z
    " fill="url(#arm-grad-r-d)"/>
  </g>

  <g filter="url(#soft-body-d)" opacity="0.35">
    <path d="
      M228,375
      C240,390 250,400 256,404
      C262,400 272,390 284,375
      C296,358 304,340 308,326
      L256,350
      L204,326
      C208,340 216,358 228,375Z
    " fill="rgba(122,179,147,0.4)"/>
  </g>

  <g filter="url(#soft-head-d)">
    <circle cx="252" cy="158" r="36" fill="url(#head-grad-d)"/>
  </g>
  <circle cx="246" cy="150" r="7" fill="rgba(168,216,184,0.25)" filter="url(#highlight-d)"/>

  <line x1="256" y1="264" x2="256" y2="340" stroke="#fffbe0" stroke-width="2" opacity="0.18" filter="url(#star-ray)"/>
  <line x1="218" y1="302" x2="294" y2="302" stroke="#fffbe0" stroke-width="2" opacity="0.18" filter="url(#star-ray)"/>

  <ellipse cx="256" cy="302" rx="32" ry="30" fill="#fffbe0" opacity="0.80" filter="url(#bloom-hot-d)"/>
  <ellipse cx="256" cy="302" rx="17" ry="16" fill="#fff8d0" opacity="0.92"/>
  <ellipse cx="256" cy="302" rx="9" ry="8.5" fill="#ffffff" opacity="0.97"/>
  <circle cx="256" cy="301" r="3.5" fill="#ffffff"/>
</svg>
