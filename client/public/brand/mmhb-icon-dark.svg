<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3548"/>
      <stop offset="35%" stop-color="#122838"/>
      <stop offset="100%" stop-color="#0a1c28"/>
    </linearGradient>
    <radialGradient id="bg-aura-d" cx="48%" cy="48%" r="55%">
      <stop offset="0%" stop-color="#1e4e60" stop-opacity="0.40"/>
      <stop offset="60%" stop-color="#12303e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0a1c28" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-ambient-d" cx="50%" cy="60%" r="38%">
      <stop offset="0%" stop-color="#ffe8a0" stop-opacity="0.42"/>
      <stop offset="35%" stop-color="#d4a843" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0a1c28" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-mid-d" cx="50%" cy="60%" r="20%">
      <stop offset="0%" stop-color="#fff5d0" stop-opacity="0.92"/>
      <stop offset="40%" stop-color="#ffe088" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4a843" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-hot-d" cx="50%" cy="60%" r="9%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#fffcef" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffe8a0" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="body-grad-d" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#7ab393" stop-opacity="0.78"/>
      <stop offset="30%" stop-color="#5a9a80" stop-opacity="0.52"/>
      <stop offset="60%" stop-color="#3e7a68" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#264f4f" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="arm-grad-l-d" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8ec4a5" stop-opacity="0.70"/>
      <stop offset="40%" stop-color="#5a9a80" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3a7060" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="arm-grad-r-d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ec4a5" stop-opacity="0.66"/>
      <stop offset="40%" stop-color="#5a9a80" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#3a7060" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="head-grad-d" cx="45%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#a8d8b8" stop-opacity="0.92"/>
      <stop offset="60%" stop-color="#78b495" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#5a9a80" stop-opacity="0.55"/>
    </radialGradient>

    <filter id="soft-body-d" x="-6%" y="-6%" width="112%" height="112%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8"/>
    </filter>
    <filter id="soft-arm-d" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
    </filter>
    <filter id="bloom-wide-d" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
    <filter id="bloom-mid-d" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15"/>
    </filter>
    <filter id="bloom-hot-d" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7"/>
    </filter>
    <filter id="soft-head-d" x="-12%" y="-12%" width="124%" height="124%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
    </filter>
    <filter id="star-ray" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4.5"/>
    </filter>
    <filter id="highlight-d" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
    </filter>
