<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <style>
      .sacred-line { stroke: #2f5d5d; stroke-width: 0.5; fill: none; opacity: 0.15; }
      .sacred-circle { stroke: #8fbf9f; stroke-width: 0.5; fill: none; opacity: 0.12; }
    </style>
  </defs>
  
  <!-- Sacred geometry flower of life inspired pattern -->
  <g transform="translate(150, 150)">
    <!-- Central circles -->
    <circle class="sacred-circle" cx="0" cy="0" r="30"/>
    <circle class="sacred-circle" cx="0" cy="0" r="50"/>
    <circle class="sacred-circle" cx="0" cy="0" r="70"/>
    <circle class="sacred-circle" cx="0" cy="0" r="100"/>
    <circle class="sacred-circle" cx="0" cy="0" r="130"/>
    
    <!-- Petal circles - 6 petals -->
    <circle class="sacred-circle" cx="0" cy="-50" r="50"/>
    <circle class="sacred-circle" cx="43.3" cy="-25" r="50"/>
    <circle class="sacred-circle" cx="43.3" cy="25" r="50"/>
    <circle class="sacred-circle" cx="0" cy="50" r="50"/>
    <circle class="sacred-circle" cx="-43.3" cy="25" r="50"/>
    <circle class="sacred-circle" cx="-43.3" cy="-25" r="50"/>
    
    <!-- Connecting lines - triangle -->
    <path class="sacred-line" d="M 0 -70 L 60.6 35 L -60.6 35 Z"/>
    <path class="sacred-line" d="M 0 70 L 60.6 -35 L -60.6 -35 Z"/>
    
    <!-- Inner hexagon -->
    <path class="sacred-line" d="M 0 -40 L 34.6 -20 L 34.6 20 L 0 40 L -34.6 20 L -34.6 -20 Z"/>
    
    <!-- Outer decorative rays -->
    <g class="sacred-line">
      <line x1="0" y1="-100" x2="0" y2="-130"/>
      <line x1="86.6" y1="-50" x2="112.6" y2="-65"/>
      <line x1="86.6" y1="50" x2="112.6" y2="65"/>
      <line x1="0" y1="100" x2="0" y2="130"/>
      <line x1="-86.6" y1="50" x2="-112.6" y2="65"/>
      <line x1="-86.6" y1="-50" x2="-112.6" y2="-65"/>
    </g>
  </g>
</svg>
