<!doctype html><html><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Healing Analytics + AI Insights</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:system-ui,-apple-system,Segoe UI,Roboto;margin:24px;max-width:980px}
.card{border:1px solid #eee;border-radius:12px;padding:16px;margin:12px 0}
summary{cursor:pointer;font-weight:600}
</style></head><body>
<h1>💚 Healing Analytics</h1>
<canvas id="healthChart" height="120"></canvas>
<details class="card" id="aiInsights"><summary>💬 AI Insights</summary><div id="aiText">Loading…</div></details>
<script>
async function render(){
 const m = await fetch("./metrics.json",{cache:"no-store"}).then(r=>r.json());
 const labels=(m.series||[]).map(x=>new Date(x.t).toLocaleString());
 const vals=(m.series||[]).map(x=>x.health);
 new Chart(document.getElementById("healthChart"),{type:"line",
  data:{labels,datasets:[{label:"Health",data:vals,tension:.2,fill:false}]},
  options:{scales:{y:{min:0,max:100}}}});
 try{
  const today=new Date().toISOString().slice(0,10);
  const s=await fetch(`./summaries/daily-${today}.json?nocache=${Date.now()}`).then(r=>r.json());
  document.getElementById("aiText").textContent=s.summary;
 }catch{document.getElementById("aiText").textContent="(No AI summary yet)";}
}
render();
</script></body></html>
