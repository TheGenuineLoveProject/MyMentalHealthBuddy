name: Brand Integrity Check

on: [push, pull_request]

jobs:
  brand:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Verify Brand Assets
        run: |
          test -f client/public/brand/logo.png
          test -f client/public/brand/logo-mark.png
          test -f client/public/brand/favicon.png