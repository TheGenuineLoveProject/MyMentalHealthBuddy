# =====================================================================
# MyMentalHealthBuddy — Unified CI/CD + Auto-Heal + Build + Deploy
# =====================================================================

name: MMB-CI-CD-Self-Evolution

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:

  # ============================================================
  # (1) System Diagnostics
  # ============================================================
  diagnose:
    name: System-Diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Run Diagnostics
        run: node scripts/scan-ui.mjs || true

  # ============================================================
  # (2) Auto-Healing (Soft-Fail)
  # ============================================================
  autoheal:
    name: Auto-Healing
    runs-on: ubuntu-latest
    needs: diagnose
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Run AutoHeal
        run: |
          echo "⚡ Running AutoHeal…"
          node scripts/autoheal-project.mjs || true

  # ============================================================
  # (3) Verification Suite (MUST PASS)
  # ============================================================
  verify:
    name: Verification Suite
    runs-on: ubuntu-latest
    needs: autoheal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Run Verification
        run: |
          echo "⚡ Running Verification…"
          node scripts/run-suite.mjs

      - name: Fail if AutoHeal suggestions exist
        run: |
          if grep -q "AutoHeal Suggestion" -r ./; then
            echo "❌ AutoHeal suggestions detected — fix required."
            exit 1
          fi
          echo "✅ No AutoHeal suggestions — safe to proceed."

  # ============================================================
  # (4) Build: Frontend + Backend (Robust Auto-Detect)
  # ============================================================
  build:
    name: Build-Frontend-Backend
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      # -----------------------------
      # FRONTEND BUILD (auto-detect)
      # -----------------------------
      - name: Build Frontend
        run: |
          echo "⚡ Attempting frontend build…"

          if [ -f "package.json" ] && grep -q "\"build\"" package.json; then
            echo "→ Root-level build"
            npm run build || exit 1
          elif [ -f "./client/package.json" ]; then
            echo "→ Building inside client/"
            cd client && npm ci && npm run build || exit 1
            cd ..
          else
            echo "⚠️ No frontend build detected — skipping"
          fi

      # -----------------------------
      # BACKEND BUILD (auto-detect)
      # -----------------------------
      - name: Build Backend
        run: |
          echo "⚡ Attempting backend build…"

          if [ -f "./server/package.json" ]; then
            cd server && npm ci && npm run build || exit 1
            cd ..
          else
            echo "⚠️ No backend build detected — skipping"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmb-build
          path: |
            client/dist
            server/dist
          retention-days: 7

  # ============================================================
  # (5) Deploy to Replit Autoscale
  # ============================================================
  deploy:
    name: Deploy-to-Replit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @replit/cli

      - name: Trigger Replit Deploy
        env:
          REPLIT_TOKEN: ${{ secrets.REPLIT_TOKEN }}
        run: |
          npx replit-deploy --token "$REPLIT_TOKEN"