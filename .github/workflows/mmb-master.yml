name: MyMentalHealthBuddy-CI-CD-Self-Evolution

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    name: System-Diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run npm audit (high-only)
        run: |
          echo "🔍 Running npm audit --level=high…"
          npm audit --audit-level=high || true

  autoheal:
    name: Auto-Healing
    needs: diagnose
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run AutoHeal Orchestrator
        run: |
          echo "🩺 Running AutoHeal…"
          node scripts/healer-orchestrator.mjs || true

  verify:
    name: Verification Suite
    needs: autoheal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Verification
        run: node scripts/run-suite.mjs

      - name: Fail if AutoHeal Suggestions Exist
        run: |
          if grep -qr "AutoHeal-suggestions" scripts; then
            echo "❌ AutoHeal suggestions detected — please fix before deploy.";
            exit 1;
          fi
          echo "✅ No AutoHeal suggestions — safe to proceed.";

  build:
    name: Build-Frontend-Backend
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Build Project
        env:
          NODE_ENV: production
        run: |
          echo "📦 Building client and server…"
          npm run build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            client/dist
            server/dist
          retention-days: 7