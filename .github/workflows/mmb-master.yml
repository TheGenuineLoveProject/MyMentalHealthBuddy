# ========================================================================
# MyMentalHealthBuddy — Unified CI/CD + AutoHeal + Build + Deploy
# ========================================================================

name: MMB-CI-CD-Orchestrator
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ===============================================================
  # (1) SYSTEM DIAGNOSTICS (soft-fail allowed)
  # ===============================================================
  diagnose:
    name: System-Diagnostics
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run Diagnostics
        run: node scripts/scan-ul.mjs || true

  # ===============================================================
  # (2) AUTO-HEALING (Silent Edition – non-blocking)
  # ===============================================================
  autoheal:
    name: Auto-Healing (Silent Edition)
    runs-on: ubuntu-latest
    needs: diagnose
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run Autoheal (Silent Mode)
        run: |
          echo "⚙️ Running Autoheal Silent Edition…"
          node scripts/autoheal-silent.mjs || true

  # ===============================================================
  # (3) VERIFICATION SUITE (HARD PASS — blocks deployment)
  # ===============================================================
  verify:
    name: Verification Suite
    runs-on: ubuntu-latest
    needs: autoheal

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run Verification
        run: |
          echo "🔍 Running Verification…"
          node scripts/run-suite.mjs

      - name: Fail if Autoheal suggestions exist
        run: |
          if grep -q "Autoheal Suggestion" -r .; then
            echo "❌ Autoheal suggestions detected — fix required."
            exit 1
          fi
          echo "✅ No Autoheal suggestions — safe to proceed."

  # ===============================================================
  # (4) BUILD — FRONTEND + BACKEND (auto-detect both directories)
  # ===============================================================
  build:
    name: Build-Frontend-Backend
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      # -------------------------------
      # FRONTEND BUILD
      # -------------------------------
      - name: Build Frontend
        run: |
          echo "🚧 Attempting frontend build…"
          if [ -f "./client/package.json" ]; then
            echo "📁 Detected client/package.json — building frontend…"
            cd client
            npm install
            npm run build || exit 1
          else
            echo "⚠️ No frontend detected — skipping."
          fi

      # -------------------------------
      # BACKEND BUILD
      # -------------------------------
      - name: Build Backend
        run: |
          echo "🚧 Attempting backend build…"
          if [ -f "./server/package.json" ]; then
            echo "📁 Detected server/package.json — building backend…"
            cd server
            npm install
            npm run build || exit 1
          else
            echo "⚠️ No backend detected — skipping."
          fi

  # ===============================================================
  # (5) UPLOAD BUILD ARTIFACTS (Optional, Safe)
  # ===============================================================
  artifacts:
    name: Upload Build Artifacts
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mmb-build
          path: |
            client/dist
            server/dist
          retention-days: 7

  # ===============================================================
  # (6) DEPLOY TO REPLIT AUTOSCALE
  # ===============================================================
  deploy:
    name: Deploy-to-Replit
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Replit CLI
        run: npm install -g @replit/cli

      - name: Trigger Replit Deploy
        env:
          REPLIT_TOKEN: ${{ secrets.REPLIT_TOKEN }}
        run: |
          echo "🚀 Deploying to Replit Autoscale…"
          npx replit deploy --token "$REPLIT_TOKEN"