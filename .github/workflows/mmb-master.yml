name: MyMentalHealthBuddy – Unified CI/CD + Silent-Autoheal + Build + Deploy
# Roger v7 – Final Stable Edition (CI-Safe, Replit-Safe)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # (1) SYSTEM DIAGNOSTICS (safe, non-blocking)
  diagnostics:
    name: System-Diagnostics
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run Diagnostics
        run: node scripts/scan-all.js || true



  # (2) AUTO-HEAL (SILENT EDITION — ALWAYS COMPLETE)
  autoheal:
    name: Auto-Healing (Silent Edition)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run Autoheal (Silent Edition)
        run: node scripts/autoheal.silent.mjs || true



  # (3) VERIFICATION SUITE (HARD PASS → BLOCKS DEPLOYMENT)
  verify:
    name: Verification Suite
    runs-on: ubuntu-latest
    needs: autoheal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Run Verification
        run: node scripts/run-suite.js

      - name: Fail if Autoheal suggestions exist
        run: |
          echo "🔍 Checking for Autoheal Suggestions..."
          if grep -R "Autoheal Suggestion" -n . ; then
            echo "❌ Autoheal suggestions detected — fix required."
            exit 1
          fi
          echo "✅ No Autoheal suggestions — safe to proceed."



  # (4) BUILD — FRONTEND + BACKEND
  build:
    name: Build-Frontend-Backend
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      # FRONTEND
      - name: Build Frontend
        run: |
          echo "🖥️ Attempting frontend build..."
          if [ -f "./client/package.json" ]; then
            echo "📦 Detected client/package.json — building frontend..."
            cd client
            npm install
            npm run build || exit 1
          else
            echo "⚠️ No frontend detected — skipping."
          fi

      # BACKEND
      - name: Build Backend
        run: |
          echo "🛠️ Attempting backend build..."
          if [ -f "./server/package.json" ]; then
            echo "📦 Detected server/package.json — building backend..."
            cd server
            npm install
            npm run build || exit 1
          else
            echo "⚠️ No backend detected — skipping."
          fi



  # (5) OPTIONAL — UPLOAD ARTIFACTS
  upload:
    name: Upload Build Artifacts
    if: success()
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/upload-artifact@v4
        with:
          name: mmb-build
          path: |
            client/dist
            server/dist
          retention-days: 7



  # (6) DEPLOY TO REPLIT AUTOSCALE
  deploy:
    name: Deploy-to-Replit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Replit CLI
        run: npm install -g @replit/cli

      - name: Trigger Replit Deploy
        env:
          REPLIT_TOKEN: ${{ secrets.REPLIT_TOKEN }}
        run: |
          echo "🚀 Deploying to Replit..."
          npx replit deploy --token "$REPLIT_TOKEN"