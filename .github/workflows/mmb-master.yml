build:
  name: Build-Frontend-Backend
  needs: verify
  runs-on: ubuntu-latest

  steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install Root Dependencies
      run: npm ci

    # ---------- FRONTEND BUILD ----------
    - name: Build Frontend
      run: |
        echo "📦 Attempting frontend build…"

        # 1) Try root-level script first
        if npm run build:client --if-present; then
          echo "✅ Ran npm run build:client"
          exit 0
        fi

        # 2) Fallback: build inside client/
        if [ -d "client" ] && [ -f "client/package.json" ]; then
          echo "📦 Detected client/package.json — building inside client/"
          cd client
          npm install
          npm run build --if-present
          exit 0
        fi

        echo "ℹ️ No frontend build script found — skipping."

    # ---------- BACKEND BUILD ----------
    - name: Build Backend
      run: |
        echo "📦 Attempting backend build…"

        # 1) Try root-level script first
        if npm run build:server --if-present; then
          echo "✅ Ran npm run build:server"
          exit 0
        fi

        # 2) Fallback: build inside server/
        if [ -d "server" ] && [ -f "server/package.json" ]; then
          echo "📦 Detected server/package.json — building inside server/"
          cd server
          npm install
          npm run build --if-present
          exit 0
        fi

        echo "ℹ️ No backend build script found — skipping."

    # ---------- OPTIONAL: ARTIFACTS ----------
    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          client/dist
          server/dist
        retention-days: 7