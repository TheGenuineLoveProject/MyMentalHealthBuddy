name: MyMentalHealthBuddy — Unified CI/CD + AutoHeal + Build + Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  # ===================================================================
  # (1) SYSTEM DIAGNOSTICS (soft-fail allowed)
  # ===================================================================
  diagnose:
    name: System-Diagnostics
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run-Diagnostics
        run: node scripts/scan-ui.mjs || true

  # ===================================================================
  # (2) AUTO-HEALING (soft edition, non-blocking)
  # ===================================================================
  autoheal:
    name: Auto-Healing
    runs-on: ubuntu-latest
    needs: diagnose
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run AutoHeal
        run: |
          echo "⚡ Running AutoHeal..."
          node scripts/autoheal-project.mjs || true

  # ===================================================================
  # (3) VERIFICATION SUITE (HARD PASS — BLOCKS DEPLOYMENT)
  # ===================================================================
  verify:
    name: Verification Suite
    runs-on: ubuntu-latest
    needs: autoheal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Run Verification
        run: |
          echo "🔍 Running Verification..."
          node scripts/run-suite.mjs

      - name: Fail if Autoheal suggestions exist
        run: |
          if grep -q "Autoheal Suggestion" -r ./; then
            echo "❌ Autoheal suggestions detected — fix required."
            exit 1
          fi
          echo "✅ No Autoheal suggestions — safe to proceed."

  # ===================================================================
  # (4) BUILD — FRONTEND + BACKEND (auto-detect both)
  # ===================================================================
  build:
    name: Build-Frontend+Backend
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      # -----------------------------
      # Frontend build
      # -----------------------------
      - name: Build Frontend
        run: |
          echo "🎨 Attempting frontend build..."
          if [ -f "client/package.json" ]; then
            echo "➡️ Detected client/package.json — building frontend..."
            cd client
            npm install
            npm run build || exit 1
          else
            echo "⚠️ No frontend detected — skipping."
          fi

      # -----------------------------
      # Backend build
      # -----------------------------
      - name: Build Backend
        run: |
          echo "🛠 Attempting backend build..."
          if [ -f "server/package.json" ]; then
            echo "➡️ Detected server/package.json — building backend..."
            cd server
            npm install
            npm run build || exit 1
          else
            echo "⚠️ No backend detected — skipping."
          fi

      # -----------------------------
      # Upload build artifacts
      # -----------------------------
      - name: Upload Build Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: mmb-build
          path: |
            client/dist
            server/dist
          retention-days: 7

  # ===================================================================
  # (5) DEPLOY TO REPLIT AUTOSCALE
  # ===================================================================
  deploy:
    name: Deploy-to-Replit
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Replit CLI
        run: npm install -g @replit/cli

      - name: Trigger Replit Deploy
        env:
          REPLIT_TOKEN: ${{ secrets.REPLIT_TOKEN }}
        run: |
          echo "🚀 Deploying to Replit..."
          npx replit-deploy --token "$REPLIT_TOKEN"