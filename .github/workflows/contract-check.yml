name: contract-check

on:
  pull_request:
  push:
    branches:
      - main
      - fix/system-history-auth-and-panel-trust
      - fix/route-manifest-clean
      - fix/ci-contract-gate

jobs:
  contract-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Generate route manifest
        run: npm run routes:manifest

      - name: Contract duplicate guard
        run: npm run pretest

      - name: Full verification
        run: npm run verify
