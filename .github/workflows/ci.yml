name: MyMentalHealthBuddy-CI-CD-Self-Evolution

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch:

jobs:
  diagnose:
    name: System-Diagnostics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run Diagnose
        run: npm run diagnose || true

  heal:
    name: Auto-Healing
    runs-on: ubuntu-latest
    needs: diagnose
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run AutoHeal
        run: npm run heal || true

  verify:
    name: Verification-Suite
    runs-on: ubuntu-latest
    needs: heal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: Run Verify
        run: npm run verify || true

  fail-if-heal-suggestions:
    name: Fail-If-Heal-Suggestions-Exist
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Check AutoHeal Suggestions
        run: |
          if grep -q "AutoHeal-Suggestions" -R .; then
            echo "❌ AutoHeal suggestions found — fix required before deploy."
            exit 1
          fi
          echo "✅ No AutoHeal suggestions — safe to continue."

  build:
    name: Build-&-Optimize
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci

      - name: Build-Frontend
        run: |
          cd client
          npm ci
          npm run build
          cd ..

      - name: Build-Backend
        run: |
          cd server
          npm ci
          npm run build
          cd ..

      - name: Upload-Build-Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            client/dist
            server/dist
            build-report.json
          retention-days: 7

  deploy:
    name: Deploy-to-Replit-Autoscale
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install-Replit-CLI
        run: npm install -g @replit/cli
      - name: Trigger Replit Deploy
        env:
          REPLIT_TOKEN: ${{ secrets.REPLIT_TOKEN }}
        run: |
          npx replit-deploy --token ${REPLIT_TOKEN}