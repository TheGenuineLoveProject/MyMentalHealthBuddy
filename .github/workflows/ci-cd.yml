name: MyMentalHealthBuddy CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3

      - name: 🧠 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Dependencies
        run: npm install

      - name: ✅ Run Tests
        run: npm run test

      - name: 🚀 Deploy to Replit (via GitHub)
        run: echo "✅ Replit deployment is manual or handled via webhook"