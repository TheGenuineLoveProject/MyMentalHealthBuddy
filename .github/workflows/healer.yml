name: Healer

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

jobs:
  healer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install-Healer-Deps
        run: npm ci

      - name: Run-Healer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
        run: |
          echo "Running healer..."
          node scripts/healer-orchestrator.mjs