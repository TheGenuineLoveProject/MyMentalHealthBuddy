name: AI Employees (Health + Quality)

on:
  schedule:
    - cron: "0 * * * *"      # hourly
    - cron: "15 9 * * *"     # daily 09:15 UTC
    - cron: "30 9 * * 1"     # weekly Mondays
    - cron: "45 9 1 * *"     # monthly 1st
  workflow_dispatch:

jobs:
  hourly:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci || npm install
      - run: node scripts/ai/hourly.mjs
  daily:
    runs-on: ubuntu-latest
    if: github.event.schedule == '15 9 * * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci || npm install
      - run: node scripts/ai/daily.mjs
  weekly:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 9 * * 1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci || npm install
      - run: node scripts/ai/weekly.mjs
  monthly:
    runs-on: ubuntu-latest
    if: github.event.schedule == '45 9 1 * *'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm ci || npm install
      - run: node scripts/ai/monthly.mjs